name: CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: axiom-ui

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: axiom-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Run performance smoke tests
        run: npm run test:performance

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: axiom-ui-dist
          path: axiom-ui/dist

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Run performance smoke tests
        run: ./mvnw -Dtest='*PerformanceSmokeTest' test

      - name: Package backend
        run: ./mvnw package -DskipTests

      - name: Upload backend artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: axiom-api-jar
          path: api/target/*.jar

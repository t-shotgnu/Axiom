<div class="flex min-h-screen flex-col bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-100">
  <header
    class="sticky top-0 z-20 border-b border-zinc-200/70 bg-white/75 backdrop-blur-md dark:border-zinc-800/80 dark:bg-zinc-950/75"
  >
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-3 sm:px-6">
      <div class="flex min-w-0 items-center gap-6">
        <a
          routerLink="/dashboard"
          class="group flex shrink-0 items-center gap-2 rounded-lg outline-none ring-primary/40 focus-visible:ring-2"
        >
          <span
            class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-sky-500 to-indigo-600 text-sm font-bold text-white shadow-sm shadow-sky-500/25"
            >A</span
          >
          <span class="text-lg font-semibold tracking-tight text-zinc-900 dark:text-white">Axiom</span>
        </a>
        <nav class="hidden items-center gap-1 sm:flex" aria-label="Main">
          <a
            routerLink="/dashboard"
            routerLinkActive="bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            class="rounded-lg px-3 py-2 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100/80 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-800/80 dark:hover:text-zinc-100"
            >Dashboard</a
          >
          <a
            routerLink="/projects"
            routerLinkActive="bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-white"
            [routerLinkActiveOptions]="{ exact: true }"
            class="rounded-lg px-3 py-2 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100/80 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-800/80 dark:hover:text-zinc-100"
            >Projects</a
          >
          <a
            routerLink="/tasks"
            routerLinkActive="bg-zinc-100 text-zinc-900 dark:bg-zinc-800 dark:text-white"
            [routerLinkActiveOptions]="{ exact: false }"
            class="rounded-lg px-3 py-2 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100/80 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-800/80 dark:hover:text-zinc-100"
            >Tasks</a
          >
        </nav>
      </div>
      <div class="flex shrink-0 items-center gap-2">
        <a
          routerLink="/tasks"
          pButton
          type="button"
          label="New Task"
          class="p-button-outlined p-button-sm hidden sm:inline-flex"
        ></a>
        @if (authApi.isAuthenticated) {
          <button
            pButton
            type="button"
            label="Logout"
            class="p-button-text p-button-sm"
            (click)="logout()"
          ></button>
        } @else {
          <a
            routerLink="/login"
            class="rounded-lg px-3 py-2 text-sm font-medium text-zinc-600 transition-colors hover:bg-zinc-100 hover:text-zinc-900 dark:text-zinc-400 dark:hover:bg-zinc-800 dark:hover:text-zinc-100"
            >Sign in</a
          >
        }
      </div>
    </div>
  </header>

  <div
    class="flex-1 bg-gradient-to-b from-zinc-50 via-white to-zinc-100/90 dark:from-zinc-950 dark:via-zinc-900 dark:to-zinc-950"
  >
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 sm:py-10">
      <router-outlet></router-outlet>
    </main>
  </div>

  <footer class="border-t border-zinc-200/70 bg-white/50 text-sm text-zinc-500 backdrop-blur-sm dark:border-zinc-800/80 dark:bg-zinc-950/50 dark:text-zinc-400">
    <div class="mx-auto max-w-7xl px-4 py-4 text-center sm:px-6">© Axiom — Task management</div>
  </footer>
</div>

<div class="text-zinc-900 dark:text-zinc-100">
  <h1 class="text-2xl font-semibold mb-4">Projects</h1>

  <p-card
    header="Create New Project"
    styleClass="mb-6 shadow-sm border border-zinc-200 dark:border-zinc-700"
  >
    <div class="flex flex-col gap-5">
      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">Project Name</label>
        <input
          pInputText
          [(ngModel)]="newProject.name"
          placeholder="e.g. Website Redesign"
          class="w-full"
        />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">Code</label>
          <input pInputText [(ngModel)]="newProject.code" placeholder="e.g. WEB" class="w-full" />
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">Description</label>
          <input
            pInputText
            [(ngModel)]="newProject.description"
            placeholder="Project description"
            class="w-full"
          />
        </div>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex justify-end border-t border-zinc-100 dark:border-zinc-800 pt-4 mt-2">
        <p-button label="Create Project" icon="pi pi-plus" (onClick)="createProject()"></p-button>
      </div>
    </ng-template>
  </p-card>

  @if (loading()) {
    <div class="flex justify-center items-center py-16">
      <p-progressSpinner strokeWidth="4" styleClass="w-12 h-12"></p-progressSpinner>
    </div>
  } @else if (projects().length === 0) {
    <div class="text-center py-16 text-zinc-500 dark:text-zinc-400">
      <i class="pi pi-inbox text-4xl mb-3 block"></i>
      <p>No projects yet. Create your first one above!</p>
    </div>
  } @else {
    <div class="grid gap-4">
      @for (p of projects(); track p.id) {
        <a [routerLink]="['/projects', p.id]" class="block group">
          <p-card styleClass="hover:shadow-md transition-all cursor-pointer group-hover:border-blue-300 dark:group-hover:border-blue-700">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-lg font-medium mr-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{{ p.name }}</span>
                <span
                  class="text-xs bg-zinc-100 dark:bg-zinc-800 px-2 py-1 rounded border border-zinc-200 dark:border-zinc-700 font-mono"
                  >{{ p.code }}</span
                >
                @if (p.description) {
                  <p class="text-sm text-zinc-500 dark:text-zinc-400 mt-1">{{ p.description }}</p>
                }
              </div>
              <i class="pi pi-chevron-right text-zinc-400 group-hover:text-blue-500 transition-colors"></i>
            </div>
          </p-card>
        </a>
      }
    </div>
  }
</div>

<div class="relative" (click)="$event.stopPropagation()">
  <!-- Active Project Trigger -->
  <div
    class="flex items-center justify-between gap-sm px-xs py-1.5 rounded hover:bg-surface-container-low cursor-pointer select-none transition-all"
    (click)="toggleDropdown()"
  >
    <div class="flex items-center gap-sm min-w-0">
      <div
        class="w-8 h-8 bg-primary rounded flex items-center justify-center text-white font-bold shrink-0 text-body-md"
      >
        {{ activeProject.code }}
      </div>
      <div class="min-w-0">
        <div class="text-body-md text-on-surface font-semibold truncate">
          {{ activeProject.name }}
        </div>
        <div class="text-body-sm text-on-surface-variant mt-[1px]">
          {{ activeProject.type }}
        </div>
      </div>
    </div>
    <span class="material-symbols-outlined text-on-surface-variant text-[20px] shrink-0"
      >expand_more</span
    >
  </div>

  <!-- Dropdown Card -->
  @if (isOpen) {
    <div
      class="absolute top-full left-0 right-0 mt-sm w-full bg-surface-container-lowest border border-outline-variant rounded-xl shadow-xl z-50 p-sm flex flex-col gap-sm"
    >
      <!-- Search input -->
      <div class="relative flex items-center">
        <span
          class="material-symbols-outlined absolute left-3 text-on-surface-variant text-[16px] pointer-events-none"
          >search</span
        >
        <input
          type="text"
          placeholder="Filter projects..."
          class="w-full pl-9 pr-3 py-1.5 border border-outline-variant rounded text-body-md bg-surface-container-low text-on-surface focus:outline-none focus:border-primary"
          [(ngModel)]="searchText"
          (ngModelChange)="onSearchChange()"
        />
      </div>

      <!-- Project options -->
      <div class="flex flex-col gap-[2px] max-h-[220px] overflow-y-auto custom-scrollbar">
        @for (proj of filteredProjects; track proj.id) {
          <div
            class="flex items-center justify-between gap-sm p-sm rounded hover:bg-surface-container-low cursor-pointer transition-all"
            (click)="selectProject(proj)"
          >
            <div class="flex items-center gap-md min-w-0">
              <div
                class="w-8 h-8 rounded flex items-center justify-center text-white font-bold shrink-0 text-body-md"
                [ngClass]="proj.colorClass || 'bg-primary'"
              >
                {{ proj.code }}
              </div>
              <div class="min-w-0">
                <p class="font-semibold text-body-md text-on-surface truncate">{{ proj.name }}</p>
                <p class="text-body-sm text-on-surface-variant mt-[1px] truncate">
                  {{ proj.type }}
                </p>
              </div>
            </div>
            @if (proj.id === activeProject.id) {
              <span class="material-symbols-outlined text-primary text-[18px] font-bold"
                >check</span
              >
            }
          </div>
        }
      </div>

      <!-- Bottom Button -->
      <div class="pt-xs border-t border-outline-variant">
        <button
          (click)="triggerCreateProject()"
          class="w-full flex items-center gap-xs text-primary font-bold hover:cursor-pointer px-sm py-1.5 text-body-sm text-left"
        >
          <span class="material-symbols-outlined text-[16px]">settings</span>
          <span>Manage projects</span>
        </button>
      </div>
    </div>
  }
</div>

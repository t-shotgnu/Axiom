spring:
  datasource:
    url: jdbc:h2:mem:axiom-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

jwt:
  secret: c3VwZXJTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MA==
  expiration: 86400000

storage:
  s3:
    endpoint: http://localhost:9000
    region: eu-central-1
    bucket: axiom-attachments
    access-key: axiomminio
    secret-key: axiomminiopassword

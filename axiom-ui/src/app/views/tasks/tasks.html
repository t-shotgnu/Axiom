<div class="text-zinc-900 dark:text-zinc-100">
  <h1 class="text-2xl font-semibold mb-4">Tasks</h1>

  <p-card
    header="Create New Task"
    styleClass="mb-6 shadow-sm border border-zinc-200 dark:border-zinc-700"
  >
    <div class="grid md:grid-cols-[2fr_1fr] gap-8">
      <!-- Left column: Core Details -->
      <div class="flex flex-col gap-5">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300"
            >Task Description</label
          >
          <input
            pInputText
            [(ngModel)]="newTask.description"
            placeholder="e.g. Implement login feature"
            class="w-full"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">Type</label>
            <p-select
              [options]="typeOptions"
              [(ngModel)]="newTask.type"
              styleClass="w-full"
              [appendTo]="'body'"
            >
              <ng-template let-option pTemplate="item">
                <div class="flex items-center gap-2">
                  <i [class]="option.icon" [style.color]="option.color"></i>
                  <span>{{ option.label }}</span>
                </div>
              </ng-template>
            </p-select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300">Status</label>
            <p-select
              [options]="statusOptions"
              [(ngModel)]="newTask.status"
              styleClass="w-full"
              [appendTo]="'body'"
            >
              <ng-template let-option pTemplate="item">
                <div class="flex items-center gap-2">
                  <i [class]="option.icon" [style.color]="option.color"></i>
                  <span>{{ option.label }}</span>
                </div>
              </ng-template>
            </p-select>
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-zinc-700 dark:text-zinc-300"
              >Priority (1-10)</label
            >
            <p-inputNumber [(ngModel)]="newTask.priority" styleClass="w-full"></p-inputNumber>
          </div>
        </div>
      </div>

      <!-- Right column: Identifiers -->
      <div
        class="flex flex-col gap-4 bg-zinc-50 dark:bg-zinc-800/50 p-5 rounded-lg border border-zinc-200 dark:border-zinc-700/50"
      >
        <div>
          <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1">
            System Identifiers
          </h3>
          <p class="text-xs text-zinc-400 dark:text-zinc-500 mb-4">
            Temporarily required. Will be auto-filled from session in the future.
          </p>
        </div>

        <div class="flex flex-col gap-2">
          <label class="text-xs font-semibold text-zinc-600 dark:text-zinc-400">Project ID</label>
          <input
            pInputText
            [(ngModel)]="projectId"
            placeholder="UUID"
            class="w-full font-mono text-sm"
          />
        </div>
      </div>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex justify-end border-t border-zinc-100 dark:border-zinc-800 pt-4 mt-2">
        <p-button label="Create Task" icon="pi pi-plus" (onClick)="createTask()"></p-button>
      </div>
    </ng-template>
  </p-card>

  <div class="mb-4 flex gap-2">
    <input
      pInputText
      [(ngModel)]="fetchProjectId"
      placeholder="Project ID to fetch"
      class="w-full"
    />
    <p-button
      label="Load Tasks"
      icon="pi pi-search"
      severity="secondary"
      (onClick)="loadTasks()"
    ></p-button>
  </div>

  <div class="space-y-3">
    @for (t of tasks; track t.controlNo) {
      <app-task-item [task]="t"></app-task-item>
    } @empty {
      <div class="text-zinc-500 dark:text-zinc-400">No tasks found.</div>
    }
  </div>
</div>

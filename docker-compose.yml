services:
  postgres:
    image: postgres:18-alpine
    container_name: axiom-postgres
    environment:
      POSTGRES_DB: axiomdb
      POSTGRES_USER: axiomuser
      POSTGRES_PASSWORD: axiompassword
    ports:
      - "5433:5432"
    volumes:
      - axiom_pg_data_v3:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiomuser -d axiomdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  minio:
    image: minio/minio:latest
    container_name: axiom-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: axiomminio
      MINIO_ROOT_PASSWORD: axiomminiopassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - axiom_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: axiom-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set axiom http://minio:9000 axiomminio axiomminiopassword; do sleep 1; done;
      mc mb --ignore-existing axiom/axiom-attachments;
      "

volumes:
  axiom_pg_data_v3:
  axiom_minio_data:
